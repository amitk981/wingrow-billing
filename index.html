var CONFIG={model:'gpt-4o-mini',detail:'low',maxTokens:300,color:'#E83166'};

function fileToBase64(f){return new Promise(function(ok,no){var r=new FileReader();r.onload=function(){ok(r.result.split(',')[1])};r.onerror=no;r.readAsDataURL(f)})}
function resizeImg(f,mx){mx=mx||512;return new Promise(function(ok){var img=new Image();img.onload=function(){var c=document.createElement('canvas'),ra=Math.min(mx/img.width,mx/img.height,1);c.width=img.width*ra;c.height=img.height*ra;c.getContext('2d').drawImage(img,0,0,c.width,c.height);c.toBlob(function(b){ok(b)},'image/jpeg',0.8)};img.src=URL.createObjectURL(f)})}
function callAI(b64){
  return fetch('/.netlify/functions/analyze-image',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({image_base64:b64,model:CONFIG.model,detail:CONFIG.detail,max_tokens:CONFIG.maxTokens})
  }).then(function(r){
    if(!r.ok)return r.json().catch(function(){return{}}).then(function(e){throw new Error(e.error||'API '+r.status)});
    return r.json();
  });
}

function pickFile(capture){return new Promise(function(ok){var fi=document.createElement('input');fi.type='file';fi.accept='image/*';fi.style.display='none';if(capture)fi.setAttribute('capture','environment');document.body.appendChild(fi);fi.onchange=function(e){ok(e.target.files[0]);fi.remove()};fi.addEventListener('cancel',function(){ok(null);fi.remove()});fi.click()})}

function findSKU(cropName){
  var lc=cropName.toLowerCase();
  for(var i=0;i<SKU_DB.length;i++){
    if(SKU_DB[i].name.toLowerCase()===lc)return SKU_DB[i];
  }
  // Partial match
  for(var i=0;i<SKU_DB.length;i++){
    if(SKU_DB[i].name.toLowerCase().indexOf(lc)!==-1||lc.indexOf(SKU_DB[i].name.toLowerCase())!==-1)return SKU_DB[i];
  }
  return SKU_DB[0]; // fallback to Tomato
}

function processAIResult(crop, weight) {
  var sku=findSKU(crop);
  
  function clickBackIfNeeded(){
    var amb=findBtn('Add Manually');
    if(amb)return wait(10);
    var allBtns=document.querySelectorAll('button');
    for(var i=0;i<allBtns.length;i++){
      var svg=allBtns[i].querySelector('svg');
      if(svg&&allBtns[i].offsetWidth<60&&allBtns[i].offsetHeight<60){
        var path=svg.querySelector('path');
        if(path){var d=path.getAttribute('d')||'';if(d.indexOf('l-')!==-1||d.indexOf('L')!==-1){allBtns[i].click();break}}
      }
    }
    return wait(200);
  }

  clickBackIfNeeded().then(function(){
    var amb=findBtn('Add Manually');
    if(amb)amb.click();
    return wait(200);
  }).then(function(){
    var allBtns2=document.querySelectorAll('button');
    var lc=sku.name.toLowerCase();
    for(var i=0;i<allBtns2.length;i++){
      if(allBtns2[i].textContent.toLowerCase().indexOf(lc)!==-1&&allBtns2[i].textContent.indexOf('Add')===-1){
        allBtns2[i].click();break;
      }
    }
    return wait(200);
  }).then(function(){
    var mb=findBtn('Enter Manually');
    if(mb)mb.click();
    return wait(200);
  }).then(function(){
    var inp=document.querySelector('input[type="number"][placeholder="0.00"]');
    if(inp&&weight&&weight!=='unknown'){setRInput(inp,String(weight))}
    return wait(200);
  }).then(function(){
    var contBtn=findBtn('Continue');
    if(contBtn)contBtn.click();
    return wait(200);
  }).then(function(){
    clOL();
    toast('\u2705 AI detected '+sku.name+' \u2014 '+weight+' '+sku.unit+'. Please verify!');
  });
}

function showErr(msg){document.getElementById('ai-bd').innerHTML+='<div class="ai-er"><strong>\u274C Failed</strong><br>'+msg+'</div><button class="ai-bt pr" id="ai-erc">Close</button>';document.getElementById('ai-erc').onclick=clOL}
function toast(msg){var t=document.createElement('div');t.className='ai-toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove()},300)},4000)}

// --- CLICK INTERCEPTION (capture phase - fires BEFORE React) ---
document.addEventListener('click',function(e){
  var btn=e.target.closest?e.target.closest('button'):null;
  if(!btn)return;

  // 1) Camera capture button on weight-capture screen (round pink button with shadow)
  if(btn.classList.contains('rounded-full')&&btn.classList.contains('shadow-lg')){
    e.stopPropagation();e.preventDefault();
    handleWeight();return;
  }

  // 2) Upload zone on image-add screen (dashed border button)
  if(btn.textContent.indexOf('Capture or Upload')!==-1){
    e.stopPropagation();e.preventDefault();
    handleImage();return;
  }

  // 3) "Add via Image" button on New Bill screen
  if(btn.textContent.indexOf('Add via Image')!==-1){
    e.stopPropagation();e.preventDefault();
    handleImage();return;
  }
},true);

// --- Handlers ---
function handleWeight(){
  pickFile(true).then(function(file){
    if(!file)return;
    var pv=URL.createObjectURL(file);
    showProc(pv);
    return processFile(file).then(function(res){
      clOL();
      // Switch to manual entry and auto-fill weight
      var mb=findBtn('Enter Manually');
      if(mb){mb.click()}
      return wait(400).then(function(){
        var inp=document.querySelector('input[type="number"][placeholder="0.00"]');
        if(inp&&res.weight&&res.weight!=='unknown'){setRInput(inp,String(res.weight))}
        toast('\u2705 '+res.crop+' \u2014 '+res.weight+' kg detected'+(CONFIG.apiKey==='YOUR_OPENAI_API_KEY_HERE'?' (Demo)':''));
      });
    }).catch(function(err){showErr(err.message)});
  });
}

function handleImage(){
  pickFile(false).then(function(file){
    if(!file)return;
    var pv=URL.createObjectURL(file);
    showProc(pv);
    return processFile(file).then(function(res){
      // Directly transition the app state without ghost clicks
      processAIResult(res.crop, res.weight);
    }).catch(function(err){showErr(err.message)});
  });
}

function processFile(file){
  // Now we always call the backend. Backend handles the actual keys securely.
  return resizeImg(file).then(function(blob){return fileToBase64(blob)}).then(function(b64){return callAI(b64)});
}
